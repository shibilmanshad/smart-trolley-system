<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartTrolley — AI Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0e1318;
      --panel: #121920;
      --border: #1e2d3a;
      --accent: #00e5ff;
      --accent2: #00ff88;
      --warn: #ff4d6d;
      --warn-bg: rgba(255, 77, 109, 0.08);
      --text: #d6eaf5;
      --muted: #4a6a80;
      --tag: #1a2e3e;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,16,0.9);
      backdrop-filter: blur(12px);
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #0077ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }

    .logo-text { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }

    .status-bar {
      display: flex; align-items: center; gap: 24px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    }

    .status-dot { display: flex; align-items: center; gap: 6px; color: var(--muted); }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2); animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(0,255,136,0); }
    }

    .time-display { color: var(--accent); font-weight: 600; }

    main {
      position: relative; z-index: 1; flex: 1;
      display: grid; grid-template-columns: 1fr 380px;
      gap: 0; height: calc(100vh - 73px);
    }

    .camera-section {
      display: flex; flex-direction: column;
      padding: 24px 28px; gap: 20px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    }

    .section-label::before {
      content: ''; display: block; width: 3px; height: 14px;
      background: var(--accent); border-radius: 2px;
    }

    .video-wrapper {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: #020508; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(0,229,255,0.06), inset 0 0 60px rgba(0,0,0,0.6);
    }

    .video-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .video-wrapper::before, .video-wrapper::after {
      content: ''; position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent); border-style: solid; z-index: 2;
    }

    .video-wrapper::before {
      top: 10px; left: 10px;
      border-width: 2px 0 0 2px; border-radius: 3px 0 0 0;
    }

    .video-wrapper::after {
      bottom: 10px; right: 10px;
      border-width: 0 2px 2px 0; border-radius: 0 0 3px 0;
    }

    .cam-badge {
      position: absolute; top: 14px; right: 14px;
      background: rgba(8,12,16,0.85);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      color: var(--accent2);
      display: flex; align-items: center; gap: 5px; z-index: 3;
    }

    .rec-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff4d6d; animation: pulse 1s infinite;
    }

    .budget-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
    }

    .budget-card h3 { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 14px; }

    .budget-form { display: flex; gap: 10px; }

    .budget-input-wrap { position: relative; flex: 1; }

    .currency-sym {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--muted);
    }

    .budget-input {
      width: 100%; padding: 10px 12px 10px 30px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }

    .budget-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }

    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: #08090c; }

    .btn-primary:hover {
      background: #33ecff;
      box-shadow: 0 0 16px rgba(0,229,255,0.4);
      transform: translateY(-1px);
    }

    .btn-danger { background: transparent; border: 1px solid var(--warn); color: var(--warn); }

    .btn-danger:hover { background: var(--warn); color: white; transform: translateY(-1px); }

    .budget-alert {
      display: none; margin-top: 12px; padding: 10px 14px;
      background: var(--warn-bg); border: 1px solid rgba(255,77,109,0.3);
      border-radius: 8px; font-size: 0.8rem; color: var(--warn);
      font-family: 'JetBrains Mono', monospace;
    }

    .budget-alert.show { display: flex; align-items: center; gap: 8px; }

    .bill-section {
      display: flex; flex-direction: column;
      background: var(--surface); overflow: hidden;
    }

    .bill-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .bill-header-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }

    .item-count {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      color: var(--muted); background: var(--tag);
      padding: 3px 10px; border-radius: 20px;
    }

    .totals-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .total-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }

    .total-card .label {
      font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
      color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px;
    }

    .total-card .value {
      font-family: 'JetBrains Mono', monospace; font-size: 1.2rem;
      font-weight: 600; color: var(--accent);
    }

    .total-card.budget .value { color: var(--text); }
    .total-card.over .value { color: var(--warn); }

    .budget-bar-wrap { margin-top: 12px; }

    .budget-bar-labels {
      display: flex; justify-content: space-between;
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      color: var(--muted); margin-bottom: 5px;
    }

    .budget-bar { height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; }

    .budget-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 10px; transition: width 0.5s ease, background 0.3s; width: 0%;
    }

    .budget-bar-fill.warn { background: linear-gradient(90deg, #ff9500, var(--warn)); }

    .bill-items {
      flex: 1; overflow-y: auto; padding: 16px 24px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .bill-items::-webkit-scrollbar { width: 4px; }
    .bill-items::-webkit-scrollbar-track { background: transparent; }
    .bill-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--muted); font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; text-align: center;
    }

    .empty-icon { font-size: 2.5rem; opacity: 0.3; }

    .bill-item {
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; animation: slideIn 0.3s ease; transition: border-color 0.2s;
    }

    .bill-item:hover { border-color: rgba(0,229,255,0.3); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .item-info { min-width: 0; }

    .item-name {
      font-size: 0.85rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }

    .item-meta { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; }

    .item-cat { color: var(--muted); background: var(--tag); padding: 2px 7px; border-radius: 4px; }
    .item-id { color: var(--muted); }

    .item-pricing { text-align: right; flex-shrink: 0; }

    .item-subtotal {
      font-family: 'JetBrains Mono', monospace; font-size: 0.95rem;
      font-weight: 600; color: var(--accent2);
    }

    .item-qty-price {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      color: var(--muted); margin-top: 2px;
    }

    .bill-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; flex-shrink: 0;
    }

    .btn-checkout {
      flex: 1; padding: 12px;
      background: linear-gradient(135deg, var(--accent2), #00c068);
      color: #06140d; border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 800;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    }

    .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,255,136,0.35); }

    .btn-reset {
      padding: 12px 16px; background: transparent;
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }

    .btn-reset:hover { border-color: var(--warn); color: var(--warn); }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(8,12,16,0.85); backdrop-filter: blur(8px);
      z-index: 100; align-items: center; justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 18px; padding: 36px; max-width: 420px; width: 90%;
      text-align: center; animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-icon { font-size: 3rem; margin-bottom: 16px; }
    .modal h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .modal p { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; }
    .modal-total { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 600; color: var(--accent2); margin-bottom: 28px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; padding: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🛒</div>
      <div class="logo-text">Smart<span>Trolley</span></div>
    </div>
    <div class="status-bar">
      <div class="status-dot"><div class="dot"></div> AI ACTIVE</div>
      <div class="status-dot"><div class="dot" style="background:var(--accent)"></div> CAM LIVE</div>
      <div class="time-display" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- LEFT: CAMERA + BUDGET -->
    <div class="camera-section">
      <div class="section-label">Live Detection Feed</div>

      <div class="video-wrapper">
        <img src="/video" alt="Live Camera Feed" />
        <div class="cam-badge"><div class="rec-dot"></div> REC · YOLOv8</div>
      </div>

      <!-- BUDGET FORM -->
      <div class="budget-card">
        <h3>💰 Set Budget Limit</h3>
        <form class="budget-form" method="POST" action="/">
          <div class="budget-input-wrap">
            <span class="currency-sym">₹</span>
            <input
              class="budget-input"
              type="number"
              name="budget"
              id="budgetInput"
              placeholder="Enter your budget"
              min="0"
            />
          </div>
          <button class="btn btn-primary" type="submit">Set</button>
        </form>
        <div class="budget-alert" id="budgetAlert">
          ⚠️ You have exceeded your budget limit!
        </div>
      </div>
    </div>

    <!-- RIGHT: BILL -->
    <div class="bill-section">
      <div class="bill-header">
        <div class="bill-header-top">
          <div class="section-label">Live Bill</div>
          <div class="item-count" id="itemCount">0 items</div>
        </div>

        <div class="totals-row">
          <div class="total-card">
            <div class="label">Total Amount</div>
            <div class="value" id="totalDisplay">₹0</div>
          </div>
          <div class="total-card budget" id="budgetCard">
            <div class="label">Budget</div>
            <div class="value" id="budgetDisplay">—</div>
          </div>
        </div>

        <div class="budget-bar-wrap">
          <div class="budget-bar-labels">
            <span>₹0</span>
            <span id="budgetBarLabel">—</span>
          </div>
          <div class="budget-bar">
            <div class="budget-bar-fill" id="budgetBarFill"></div>
          </div>
        </div>
      </div>

      <!-- ITEMS LIST -->
      <div class="bill-items" id="billItems">
        <!-- items injected by JS -->
      </div>

      <!-- FOOTER -->
      <div class="bill-footer">
        <button class="btn-checkout" onclick="showCheckout()">✓ Checkout</button>
        <button class="btn-reset" onclick="resetBill()">Reset</button>
      </div>
    </div>
  </main>

  <!-- CHECKOUT MODAL -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal">
      <div class="modal-icon">🎉</div>
      <h2>Ready to Checkout</h2>
      <p>Your items have been confirmed.</p>
      <div class="modal-total" id="modalTotal">₹0</div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="closeModal()">✓ Confirm</button>
        <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ── CLOCK ──
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-IN', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ══════════════════════════════════════
    // FIX 1: BEEP SOUND
    // Uses Web Audio API — no file needed,
    // works in all browsers without autoplay block
    // ══════════════════════════════════════
    let audioCtx = null;

    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playBeep() {
      try {
        const ctx = getAudioContext();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1050, ctx.currentTime);      // beep pitch
        gainNode.gain.setValueAtTime(0.4, ctx.currentTime);              // volume
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2); // fade out

        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.2);                          // 200ms beep
      } catch(e) {
        console.warn('Beep failed:', e);
      }
    }

    // Unlock AudioContext on first user interaction (required by browsers)
    document.addEventListener('click', function unlockAudio() {
      getAudioContext();
      document.removeEventListener('click', unlockAudio);
    }, { once: true });


    // ══════════════════════════════════════
    // FIX 2: BILL POLLING — track previous
    // state to detect NEW scans & render ALL items
    // ══════════════════════════════════════
    let currentBudget = {{ budget }};

    // Track previous item quantities to detect new scans
    let prevItemState = {};   // { product_id: qty }

    function updateBill() {
      fetch('/bill_data')
        .then(r => r.json())
        .then(data => {
          currentBudget = data.budget;

          // ── Detect new/updated scans → play beep ──
          let newScanDetected = false;
          data.items.forEach(item => {
            const prevQty = prevItemState[item.product_id] || 0;
            if (item.qty > prevQty) {
              newScanDetected = true;
            }
            prevItemState[item.product_id] = item.qty;
          });

          if (newScanDetected) playBeep();

          // ── Update totals ──
          document.getElementById('totalDisplay').textContent = '₹' + data.total;
          document.getElementById('budgetDisplay').textContent =
            data.budget > 0 ? '₹' + data.budget : '—';
          document.getElementById('modalTotal').textContent = '₹' + data.total;
          document.getElementById('budgetBarLabel').textContent =
            data.budget > 0 ? '₹' + data.budget : '—';

          // ── Item count ──
          const totalQty = data.items.reduce((sum, i) => sum + i.qty, 0);
          document.getElementById('itemCount').textContent =
            totalQty + (totalQty === 1 ? ' item' : ' items');

          // ── Budget bar ──
          const fill = document.getElementById('budgetBarFill');
          if (data.budget > 0) {
            const pct = Math.min((data.total / data.budget) * 100, 100);
            fill.style.width = pct + '%';
            fill.classList.toggle('warn', pct >= 80);
          } else {
            fill.style.width = '0%';
          }

          // ── Budget alert ──
          const alertEl = document.getElementById('budgetAlert');
          if (data.budget > 0 && data.total > data.budget) {
            alertEl.classList.add('show');
          } else {
            alertEl.classList.remove('show');
          }

          // ── Render bill items (ALL of them) ──
          const container = document.getElementById('billItems');

          if (data.items.length === 0) {
            // Show empty state
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <div>Scan a product to start billing</div>
                <div style="color: var(--border); margin-top: 4px;">Point barcode at camera</div>
              </div>`;
            return;
          }

          // Render ALL scanned items
          container.innerHTML = data.items.map(item => `
            <div class="bill-item">
              <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-meta">
                  <span class="item-cat">${item.category}</span>
                  <span class="item-id">#${item.product_id}</span>
                </div>
              </div>
              <div class="item-pricing">
                <div class="item-subtotal">₹${item.subtotal}</div>
                <div class="item-qty-price">${item.qty}× ₹${item.price}</div>
              </div>
            </div>
          `).join('');
        })
        .catch(() => {});
    }

    // Poll every 1.5 seconds
    setInterval(updateBill, 1500);
    updateBill();

    // ── RESET ──
    function resetBill() {
      prevItemState = {};   // clear tracking on reset
      fetch('/reset').then(() => updateBill());
    }

    // ── CHECKOUT MODAL ──
    function showCheckout() {
      document.getElementById('checkoutModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('checkoutModal').classList.remove('show');
    }

    document.getElementById('checkoutModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
